<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book a Call - DevPortfolio</title>
<style>
  body {
    background: #0d0704;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 60px 20px;
    text-align: center;
  }
  .card {
    max-width: 600px;
    margin: 0 auto;
    border: 2px solid #ff6a00;
    border-radius: 16px;
    padding: 40px;
    background: rgba(255,106,0,0.05);
  }
  h1 { font-size: 32px; margin-bottom: 10px; }
  p { color: #ccc; margin-bottom: 25px; }
  img { width: 220px; border-radius: 12px; margin-top: 10px; }
  .back-link {
    display: inline-block;
    margin-top: 30px;
    color: #ff8c3a;
    text-decoration: none;
    font-weight: 600;
  }
  .back-link:hover { text-decoration: underline; }
</style>
</head>
<body>

  <div class="card">
    <h1>Book a Call With Me</h1>
    <p>$10/hour — 15 min = $2.5, 30 min = $5</p>

    <div class="calendly-inline-widget" 
         data-url="https://calendly.com/yourusername/15min" 
         style="min-width:280px; height:450px; margin-bottom:30px;">
    </div>
    <script src="https://assets.calendly.com/assets/external/widget.js" async></script>

    <h3>Scan to Pay</h3>
    <img src="images/payment-qr.jpeg" alt="Scan to pay QR code">
    <p style="font-size:13px;">After payment, send me a screenshot via email/WhatsApp to confirm your slot.</p>
  </div>

  <a href="index.html" class="back-link">← Back to Portfolio</a>

</body>
</html>
